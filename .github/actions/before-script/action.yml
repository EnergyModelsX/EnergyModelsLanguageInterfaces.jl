name: before-script
description: "Common before script"
runs:
  using: "composite"
  steps:
    - name: Update and install Linux dependencies
      if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y \
        xorg-dev mesa-utils xvfb libgl1 freeglut3-dev \
        libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev \
        libxext-dev xsettingsd x11-xserver-utils
      shell: bash