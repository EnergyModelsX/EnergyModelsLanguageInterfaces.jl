name: CI
on:
  push:
    branches:
      - main
      - release-*
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.arch }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: '1'  # The latest point-release (Linux)
            os: ubuntu-latest
            arch: x64
          - version: 'lts'  # The long term stable version (Linux) 
            os: ubuntu-latest
            arch: x64
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true  # Fetch the submodules
      - uses: ./.github/actions/before-script
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: ${{ matrix.arch }}
      - uses: actions/cache@v3
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - uses: julia-actions/julia-buildpkg@v1
      - name: Run Julia tests inside the testenv-enviornment in Miniconda
        run: |
          source "$HOME/miniconda/etc/profile.d/conda.sh"
          conda init bash
          conda activate testenv
          julia --project=. -e '
            using Pkg;
            ENV["PYTHON"] = joinpath(ENV["HOME"], "miniconda", "envs", "testenv", "bin", "python");
            Pkg.build("PyCall");
            Pkg.test(; coverage=true)
          '
        shell: bash
